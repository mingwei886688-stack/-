name: 构建发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── macOS Web 版 ───
  build-macos-web:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pypdfium2

      - name: 构建 Web 版
        working-directory: src
        run: |
          pyinstaller --onedir --name="文件大助-Web" \
            --add-data "web/templates:web/templates" \
            --add-data "web/static:web/static" \
            --collect-all flask \
            --collect-all pypdfium2 \
            --hidden-import=common \
            --hidden-import=core \
            --hidden-import=pdf_tools \
            --hidden-import=table_tools \
            --hidden-import=pdf_tools.ui \
            --hidden-import=table_tools.ui \
            --hidden-import=common.widgets \
            --hidden-import=common.styles \
            --hidden-import=common.models \
            --hidden-import=web \
            --hidden-import=web.routes \
            --hidden-import=web.routes.pdf \
            --hidden-import=web.routes.table \
            main_web.py

      - name: 打包为 zip
        run: |
          cd src/dist
          zip -r "文件大助-Web-macOS-arm64.zip" "文件大助-Web/"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 文件大助-Web-macOS-arm64
          path: src/dist/文件大助-Web-macOS-arm64.zip

  # ─── Windows Web 版 ───
  build-windows-web:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pypdfium2

      - name: 构建 Web 版
        working-directory: src
        run: |
          pyinstaller --onedir --name="文件大助-Web" `
            --add-data "web/templates;web/templates" `
            --add-data "web/static;web/static" `
            --collect-all flask `
            --collect-all pypdfium2 `
            --hidden-import=common `
            --hidden-import=core `
            --hidden-import=pdf_tools `
            --hidden-import=table_tools `
            --hidden-import=pdf_tools.ui `
            --hidden-import=table_tools.ui `
            --hidden-import=common.widgets `
            --hidden-import=common.styles `
            --hidden-import=common.models `
            --hidden-import=web `
            --hidden-import=web.routes `
            --hidden-import=web.routes.pdf `
            --hidden-import=web.routes.table `
            main_web.py

      - name: 打包为 zip
        run: |
          Compress-Archive -Path src\dist\文件大助-Web\* -DestinationPath src\dist\文件大助-Web-Windows-x64.zip

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 文件大助-Web-Windows-x64
          path: src/dist/文件大助-Web-Windows-x64.zip

  # ─── 创建 Release ───
  release:
    needs: [build-macos-web, build-windows-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载 macOS 产物
        uses: actions/download-artifact@v4
        with:
          name: 文件大助-Web-macOS-arm64

      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: 文件大助-Web-Windows-x64

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "文件大助 ${{ github.ref_name }}"
          files: |
            文件大助-Web-macOS-arm64.zip
            文件大助-Web-Windows-x64.zip
          generate_release_notes: true
